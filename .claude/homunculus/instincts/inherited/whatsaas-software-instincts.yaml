# Whatsaas Software Workflow Add Or Extend Voice Feature

## Action

Follow the add-or-extend-voice-feature workflow:
1. Create or update dashboard UI pages under app/[locale]/(dashboard)/voice/*/page.tsx
2. Create or update API route files under app/api/voice/*/route.ts
3. Implement or modify service logic in lib/voice/service.ts and related files
4. Update or add database schema and migrations in lib/db/schema.ts and lib/db/migrations/*
5. Update permissions in lib/permissions.ts if needed
6. Add or update tests in lib/voice/__tests__/*
7. Update shared components in components/voice/* or components/interface/*

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: app/[locale]/(dashboard)/voice/*/page.tsx, app/api/voice/*/route.ts, lib/voice/service.ts

